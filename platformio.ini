; Airyn Flight PlatformIO configuration.
; Select a model profile with AIRYN_PROFILE, for example:
;   AIRYN_PROFILE=dev/test_model pio run -e RP2350A

[platformio]
default_envs = RP2350A

[env]
monitor_speed = 115200
monitor_echo = yes
lib_extra_dirs = vendor
extra_scripts = pre:tools/platformio_prebuild.py
build_flags =
    -I build/generated

[env:ESP32]
board = esp32dev
platform = espressif32
framework = arduino
monitor_filters = esp32_exception_decoder

[env:ESP32-S3]
board = lolin_s3_mini
platform = espressif32
framework = arduino
monitor_filters = esp32_exception_decoder
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

[env_rp2_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
platform_packages = framework-arduinopico@https://github.com/earlephilhower/arduino-pico.git#5.5.0
build_flags =
    ${env.build_flags}
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS

[env:RP2040]
extends = env_rp2_base
board = pico

[env:RP2350A]
extends = env_rp2_base
board = rpipico2

[env:RP2350B]
extends = env_rp2_base
board = solderparty_rp2350_stamp_xl

[env:STM32F411]
board = blackpill_f411ce
platform = ststm32
framework = arduino
lib_deps =
    stm32duino/STM32duino FreeRTOS
build_flags =
    ${env.build_flags}
    -D SERIAL_RX_BUFFER_SIZE=256
    -D SERIAL_TX_BUFFER_SIZE=256
    -D MF_HACK_STM32_INTERRUPT_PRIORITY=1

